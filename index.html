<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCM — Claude Code Manager</title>
<meta name="description" content="The power-user toolkit for Claude Code. Manage accounts, sessions, environments, and usage — all from the terminal.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg-primary: #0a0f1a;
  --bg-secondary: #0d1117;
  --bg-card: rgba(255,255,255,0.03);
  --border-card: rgba(255,255,255,0.06);
  --border-glow: rgba(56,189,248,0.3);
  --accent-cyan: #38bdf8;
  --accent-violet: #818cf8;
  --accent-green: #4ade80;
  --accent-amber: #f59e0b;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --terminal-bg: #0f172a;
  --terminal-bar: #1e293b;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── Shared layout ── */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ── Shared typography ── */
.section-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* ── Glassmorphism card ── */
.glass-card {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-card);
  border-radius: 12px;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
}

.glass-card:hover {
  border-color: var(--border-glow);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

/* ── Gradient text ── */
.gradient-text {
  background: linear-gradient(135deg, #e2e8f0 0%, #38bdf8 50%, #818cf8 100%);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ── Terminal window chrome ── */
.terminal-window {
  border-radius: 12px;
  overflow: hidden;
  box-shadow:
    0 25px 60px rgba(0,0,0,0.5),
    0 0 40px rgba(56,189,248,0.06);
  border: 1px solid rgba(255,255,255,0.08);
}

.terminal-titlebar {
  background: var(--terminal-bar);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.terminal-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.terminal-dot.red    { background: #ef4444; }
.terminal-dot.yellow { background: #eab308; }
.terminal-dot.green  { background: #22c55e; }

.terminal-title {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

.terminal-body {
  background: var(--terminal-bg);
  padding: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.8;
}
</style>
</head>
<body>
  <section class="hero" id="hero"></section>
  <section class="problem" id="problem"></section>
  <section class="demo" id="demo"></section>
  <section class="features" id="features"></section>
  <section class="how-it-works" id="how-it-works"></section>
  <section class="install" id="install"></section>
  <section class="social-proof" id="social-proof"></section>
  <section class="commands" id="commands"></section>
  <footer class="footer" id="footer"></footer>
<script>
</script>
</body>
</html>
